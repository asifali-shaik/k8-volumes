apiVersion: v1
kind: Pod
metadata:
  name: test-pd
spec:
  containers:
  - image: nginx
    name: nginx
    volumeMounts:
    - mountPath: /var/log/nginx
      name: nginx-logs
  - image: almalinux
    name: alma
    command: ["sleep","1000"]
    volumeMounts:
    - mountPath: /mnt/nginx-logs
      name: nginx-logs 
      readOnly: true 
  volumes:
  - name: nginx-logs
    emptyDir:
      sizeLimit: 500Mi