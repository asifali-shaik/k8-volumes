apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: roboshop-claim
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: roboshop
  resources:
    requests:
      storage: 4Gi
---
apiVersion: v1
kind: Pod
metadata:
  name: app
spec:
  nodeSelector:
    topology.kubernetes.io/zone: us-east-1b
  containers:
  - name: nginx
    image: nginx 
    volumeMounts:
    - name: html-data
      mountPath: /usr/share/nginx/html
  volumes:
  - name: html-data
    persistentVolumeClaim:
      claimName: roboshop-claim   